<html>
  <head>
    <style>
      body {
        font-family: 'Inter', Arial, sans-serif;
        line-height: 1.6;
        color: #f5f0e8;
        background-color: #0d0d0d;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        padding: 0;
        background-color: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #333;
      }
      .header {
        background: #f5c842;
        color: #0d0d0d;
        padding: 30px 20px;
        text-align: center;
        border-bottom: 2px solid #2a2a2a;
      }
      .content {
        padding: 30px;
        background: #1a1a1a;
        color: #a0a0a0;
      }
      h2 {
        color: #f5f0e8;
        margin-top: 0;
      }
      ul li {
        margin-bottom: 10px;
      }
      .button {
        display: inline-block;
        padding: 12px 24px;
        background-color: #f5c842;
        color: #0d0d0d;
        font-weight: bold;
        text-decoration: none;
        border-radius: 6px;
        margin-top: 20px;
      }
      .button:hover {
        background-color: #e6b831;
      }
    </style>
  </head>
  <body>
    <div class='container'>
      <div class='header'>
        <img src="http://localhost:3000/images/StackPilot%20Logo%20Black.png" alt="StackPilot Logo" style="height: 48px; object-fit: contain;" />
      </div>
      <div class='content'>
        <h2>Hi Samyukth,</h2>
        <p>Welcome to StackPilot - your career intelligence platform for
          developers!</p>
        <p>Get started by:</p>
        <ul>
          <li>Uploading your resume for ATS scoring</li>
          <li>Finding your perfect job matches</li>
          <li>Saving jobs you're interested in</li>
        </ul>
        <a href='http://localhost:3000/login' class='button'>Go to Dashboard</a>
      </div>
    </div>
  </body>
</html>
